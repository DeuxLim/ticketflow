  - id: UX-OVERHAUL-P1
    title: App-Wide UX Overhaul
    type: epic
    parent_id: null
    status: in_progress
    priority: high
    mvp: true
    description: Rework the app into a modal-first, lower-clutter operator experience with clearer labels, calmer information density, and more focused task flows across workspace, settings, admin, and auth surfaces.
    definition_of_done:
      - Core workspace CRUD, ticket workflows, settings, admin, and auth surfaces follow a consistent modal-first interaction model.
      - Primary pages are oriented around review and action, not permanently exposed edit forms.
      - Required inputs have visible labels and non-obvious fields include helper text.
      - Frontend verification passes after each wave and on epic closeout.
      - Progress is tracked in the canonical roadmap and progress log throughout the rollout.
    dependencies:
      - PERF-P1
    notes:
      - "2026-04-20: Initialized from UX audit and implementation plan for a full-app experience overhaul."
      - "2026-04-20: Selected design defaults: modal-first interactions, phased tracking, full product rethink within existing backend/API contracts, optimized for balanced teams."
      - "2026-04-20: Completed Wave 1 workspace CRUD hardening across invitations, customers, members, and tickets after frontend lint, test, and build verification."
      - "2026-04-21: Wave 2 now covers ticket details, ticketing/forms settings, and admin workspace editor decluttering."
      - "2026-04-21: Completed Wave 2 after auth/onboarding cleanup and full frontend verification."
      - "2026-04-21: App-wide QA pass found workflow automation settings still had always-visible placeholder-driven create flows; moved workflow/rule creation into dialogs with labeled fields and targeted coverage."
      - "2026-04-22: Governance/security QA moved SSO provider and SCIM directory creation into focused dialogs with labeled fields and regression coverage."
      - "2026-04-22: Governance QA moved SLA policy creation and break-glass requests into focused dialogs with labeled fields and regression coverage."
      - "2026-04-22: Integrations QA moved webhook endpoint creation into a focused dialog with visible labels, helper text, and regression coverage."
    incomplete_reason: "Workspace CRUD, ticket details, settings, admin, auth/onboarding, workflow automation creation, governance setup, and integrations endpoint cleanup are complete; final app-wide QA remains before epic closeout."
    blocked_reason: null
    deferred_reason: null
    discovered_during_implementation: false
    next_actions:
      - Run final app-wide UX QA on any remaining governance review-only states.
      - Close the UX overhaul epic after any final QA fixes and verification.
