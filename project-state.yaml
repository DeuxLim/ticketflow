  - id: MAINT-P1
    title: Frontend Maintainability Decomposition
    type: epic
    parent_id: null
    status: complete
    priority: high
    mvp: true
    description: Reduce complexity in oversized, high-churn frontend screens by centralizing duplicated ticket-form logic and splitting monolithic route views into smaller units without changing product behavior.
    definition_of_done:
      - Shared ticket-form schema, defaults, and payload helpers are centralized and covered by regression tests.
      - Oversized workspace ticket and admin/governance screens are decomposed into smaller focused modules or components.
      - No public API, route, or permission behavior regresses during the refactor.
      - Frontend verification passes and canonical tracker files stay synchronized throughout the refactor.
    dependencies:
      - HARDEN-P1
      - ALIGN-P1
    notes:
      - "2026-04-24: Initialized after all tracked MVP feature work was complete and a codebase scan showed the main remaining engineering risk had shifted to oversized frontend screens such as `TicketDetailsPage.tsx` (1727 lines), `TicketsPage.tsx` (1421 lines), `AdminDashboardPage.tsx` (832 lines), and `GovernanceSettingsSection.tsx` (830 lines)."
      - "2026-04-24: Completed the first safe extraction by moving shared ticket-form schema, defaults, server-field error mapping, tag parsing, custom-field payload building, and template filtering into `frontend/src/features/workspace/pages/ticketForm.ts` with regression coverage in `ticketForm.test.ts`."
      - "2026-04-24: Started `MAINT-P1-T02` by extracting ticket dialog form rendering from `TicketsPage.tsx` into `TicketFormFields.tsx` while keeping behavior on the shared ticket-form contract."
      - "2026-04-24: Continued `MAINT-P1-T02` by extracting the saved-view, filter, and bulk-action sheet from `TicketsPage.tsx` into `TicketQueueControlsSheet.tsx`."
      - "2026-04-25: Continued `MAINT-P1-T02` by extracting the queue table, row actions, loading/error/empty states, selection handling, and pagination rendering from `TicketsPage.tsx` into `TicketQueueTable.tsx`."
      - "2026-04-25: Completed the remaining `TicketsPage` cleanup by extracting search/summary rendering into `TicketQueueSearchBar.tsx` and moving form-state shaping helpers into `ticketQueueHelpers.ts`."
      - "2026-04-25: Completed `MAINT-P1-T03` by moving ticket-details dialog schemas and formatting helpers into `ticketDetailsHelpers.ts`, extracting the edit sheet into `TicketDetailsEditSheet.tsx`, and extracting checklist, attachments, watchers, related-ticket, and add-comment dialogs into `TicketDetailsSupportDialogs.tsx`."
      - "2026-04-25: Started `MAINT-P1-T04` by extracting the admin workspace limits/feature-flags editor into `AdminWorkspaceEditorDialog.tsx` and `adminWorkspaceEditorHelpers.ts`, reducing duplicated modal/editor logic in `AdminDashboardPage.tsx`."
      - "2026-04-25: Continued `MAINT-P1-T04` by extracting the governance dialog stack into `GovernanceSettingsDialogs.tsx`, leaving `GovernanceSettingsSection.tsx` focused on overview cards and mutation wiring."
      - "2026-04-26: Completed `MAINT-P1-T04` by extracting the admin workspaces/users tabs into `AdminDashboardTabs.tsx`, reducing `AdminDashboardPage.tsx` to 375 lines while keeping metrics, queries, and mutation orchestration local."
      - "2026-04-26: Completed `MAINT-P1-T05` closeout verification with `frontend` `npm test`, `npm run lint`, `npm run build`, plus YAML validation and `git diff --check`."
    incomplete_reason: null
