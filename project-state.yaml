  - id: REFACTOR-P1
    title: Laravel and React Standards Alignment
    type: refactor
    parent_id: null
    status: in_progress
    priority: high
    mvp: true
    description: Align the active Laravel backend and React frontend with project-specific conventions, framework standards, and maintainability best practices without changing product behavior.
    definition_of_done:
      - Starter framework metadata and documentation are replaced with project-specific guidance.
      - Remaining app-owned oversized backend/frontend surfaces are ranked by risk and implementation value.
      - Safe convention fixes are landed incrementally with relevant verification.
      - Backend/frontend API boundaries remain behavior-compatible throughout the refactor.
    dependencies:
      - CLEAN-P1
    notes:
      - "2026-04-29: Started after repository cleanup completed and the working tree was pushed clean."
      - "2026-04-29: Completed first safe alignment slice by replacing backend/frontend starter READMEs, updating backend Composer metadata, removing the stale Laravel asset publish hook, refreshing the Composer lock content hash, and preserving the Laravel Unit test suite directory with `.gitkeep`."
      - "2026-04-29: Audit found next likely targets: app-owned oversized screens/controllers, frontend API modules currently colocated under page folders, and backend route/controller grouping pressure."
      - "2026-04-29: Completed the frontend API boundary slice by moving workspace API modules and their tests from `pages/` and `settings/` into `frontend/src/features/workspace/api/`, then updating route/settings imports and mocks."
      - "2026-04-29: Completed the first function-level `TicketDetailsPage.tsx` slice by centralizing repeated ticket query invalidation blocks into local invalidation helpers while preserving mutation behavior."
      - "2026-04-29: Extracted read-only ticket details presentation cards into `TicketDetailsOverviewCards.tsx`, moving summary, activity, SLA, tools, and custom-field rendering out of the route component."
      - "2026-04-30: Extracted ticket comments rendering, editing controls, comment attachments display, and comment attachment download actions into `TicketDetailsCommentsCard.tsx`, reducing the route component to 828 lines while preserving mutation ownership in the route."
      - "2026-04-30: Extracted ticket header badges, primary actions, follow/unfollow controls, transition buttons, and delete/edit triggers into `TicketDetailsHeader.tsx`, reducing the route component to 767 lines while preserving mutation ownership in the route."
      - "2026-04-30: Extracted watcher follow/unfollow mutations into `useTicketDetailsWatcherMutations.ts`, keeping query invalidation injected by the route and reducing `TicketDetailsPage.tsx` to 758 lines."
      - "2026-05-01: Extracted ticket-level attachment upload/delete mutations into `useTicketDetailsAttachmentMutations.ts`, keeping selected-file state and query invalidation in the route and reducing `TicketDetailsPage.tsx` to 750 lines."
      - "2026-05-01: Extracted checklist add/update/delete/reorder mutations into `useTicketDetailsChecklistMutations.ts`, keeping form reset and query invalidation injected by the route and reducing `TicketDetailsPage.tsx` to 730 lines."
      - "2026-05-01: Extracted related-ticket add/delete mutations into `useTicketDetailsRelatedTicketMutations.ts`, keeping form reset, panel close, and query invalidation injected by the route and reducing `TicketDetailsPage.tsx` to 720 lines."
      - "2026-05-01: Extracted comment add/update/delete mutations into `useTicketDetailsCommentMutations.ts`, keeping form reset, editing state, panel close, and query invalidation injected by the route and reducing `TicketDetailsPage.tsx` to 695 lines."
      - "2026-05-01: Extracted ticket edit, quick-transition, and delete mutations into `useTicketDetailsTicketMutations.ts`, keeping route-owned UI side effects injected by callbacks and reducing `TicketDetailsPage.tsx` to 661 lines."
      - "2026-05-01: Extracted add-comment dialog rendering into `TicketDetailsCommentDialog.tsx`, reducing `TicketDetailsSupportDialogs.tsx` to 389 lines while keeping route wiring unchanged."
      - "2026-05-01: Extracted checklist dialog rendering into `TicketDetailsChecklistDialog.tsx`, reducing `TicketDetailsSupportDialogs.tsx` to 339 lines while keeping route wiring unchanged."
      - "2026-05-01: Extracted watchers dialog rendering into `TicketDetailsWatchersDialog.tsx`, reducing `TicketDetailsSupportDialogs.tsx` to 324 lines while keeping route wiring unchanged."
      - "2026-05-01: Extracted attachments dialog rendering into `TicketDetailsAttachmentsDialog.tsx`, reducing `TicketDetailsSupportDialogs.tsx` to 277 lines while keeping route wiring unchanged."
      - "2026-05-01: Extracted related-ticket dialog rendering into `TicketDetailsRelatedTicketsDialog.tsx`, reducing `TicketDetailsSupportDialogs.tsx` to 181 lines while keeping route wiring unchanged."
    incomplete_reason: "Documentation, metadata, frontend API boundary alignment, and fifteen TicketDetails slices are complete, but the route still owns derived page orchestration."
